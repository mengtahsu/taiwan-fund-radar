name: Update data and deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # GitHub cron uses UTC. This runs at 04:00, 12:00, and 20:00 Taiwan time.
    - cron: "0 20,4,12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FUND_SOURCE_URL: ${{ secrets.FUND_SOURCE_URL || vars.FUND_SOURCE_URL }}
      FUND_SOURCE_NAME: ${{ vars.FUND_SOURCE_NAME || '基金資料來源' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Restore update caches
        uses: actions/cache@v4
        with:
          path: |
            data/nav_cache.json
            data/monthly_nav.json
            data/fundrich_cache.json
            data/margin.json
          key: update-caches-${{ github.run_id }}
          restore-keys: |
            update-caches-

      - name: Create source config
        if: env.FUND_SOURCE_URL != ''
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("config").mkdir(exist_ok=True)
          Path("config/source.json").write_text(
              json.dumps(
                  {
                      "sourceName": os.environ["FUND_SOURCE_NAME"],
                      "sourceUrl": os.environ["FUND_SOURCE_URL"],
                      "outputPath": "data/funds.json",
                      "intervalHours": 8,
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Update fund data
        if: env.FUND_SOURCE_URL != ''
        run: python3 update_funds.py --config config/source.json --once

      - name: Update Taiwan fund data with channel links
        if: env.FUND_SOURCE_URL == ''
        run: timeout 6m python3 update_funds.py --provider combined-tw-funds --once || echo "Fund update timed out or failed; deploying committed data/funds.json"

      - name: Update market data
        run: timeout 1m python3 update_funds.py --provider markets --once || echo "Market update timed out or failed; deploying committed data/markets.json if present"

      - name: Update margin data
        run: timeout 3m python3 update_funds.py --provider margin --once || echo "Margin update timed out or failed; deploying committed data/margin.json if present"

      - name: Run sanity checks
        run: node scripts/sanity-check.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
